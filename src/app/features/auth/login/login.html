<div class="login-container">

  <!-- Panel izquierdo: Bienvenida -->
  <div class="login-brand">
    <div class="brand-circle brand-circle-1"></div>
    <div class="brand-circle brand-circle-2"></div>
    <div class="brand-circle brand-circle-3"></div>

    <div class="brand-content">
      <div class="brand-logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11V7a3 3 0 0 1 6 0v4" />
          <rect x="5" y="11" width="14" height="10" rx="2" />
          <circle cx="12" cy="16" r="1" />
        </svg>
      </div>

      <h1 class="brand-title">SISAL</h1>
      <p class="brand-subtitle">Sistema de Gestión de<br>Permisos de Salida</p>

      <div class="brand-features">
        <div class="brand-feature">
          <div class="feature-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <span>Empleados</span>
        </div>

        <div class="brand-feature">
          <div class="feature-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2" />
              <rect x="9" y="3" width="6" height="4" rx="1" />
              <path d="M9 14l2 2 4-4" />
            </svg>
          </div>
          <span>Permisos</span>
        </div>

        <div class="brand-feature">
          <div class="feature-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.9)"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
              <path d="M9 12l2 2 4-4" />
            </svg>
          </div>
          <span>Seguridad</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Panel derecho: Formulario -->
  <div class="login-form-panel">
    <div class="login-form-wrapper">

      <h2 class="form-title">Bienvenido</h2>
      <p class="form-subtitle">Ingresa tus credenciales para continuar</p>

      <div class="form-fields">

        <div class="custom-field">
          <label>Número de documento</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">badge</mat-icon>
            <input type="text" [(ngModel)]="documento" placeholder="12345678" maxlength="8"
              (keydown.enter)="iniciarSesion()" (keydown)="soloNumeros($event)" (paste)="filtrarPegado($event)" />
          </div>
          <span class="input-hint">8 dígitos</span>
        </div>

        <div class="custom-field">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <mat-icon class="input-icon">lock</mat-icon>
            <input [type]="ocultarPassword ? 'password' : 'text'" [(ngModel)]="password" placeholder="Tu contraseña"
              (keydown.enter)="iniciarSesion()" />
            <mat-icon class="input-icon-suffix" (click)="ocultarPassword = !ocultarPassword">
              {{ ocultarPassword ? 'visibility_off' : 'visibility' }}
            </mat-icon>
          </div>
        </div>

      </div>

      <button mat-flat-button class="login-button" (click)="iniciarSesion()" [disabled]="cargando()">
        @if (cargando()) {
        <mat-spinner diameter="22" color="accent"></mat-spinner>
        } @else {
        Iniciar sesión
        }
      </button>

      <p class="login-footer">SISAL v1.0 — Sistema de Gestión de Permisos</p>

    </div>
  </div>

</div>
